<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Matching Geddy Lee's Moving Pictures bass tone with the RS-40 — Random Samples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #D4912A;
    --amber-light: #E8B44C;
    --crimson-deep: #5C1018;
    --crimson: #8B1A2B;
    --crimson-light: #A82840;
    --black: #0A0808;
    --panel: #1E1A17;
    --text-primary: #E8DCC8;
    --text-dim: #9A8E7E;
    --text-muted: #5E554A;
    --grid-line: rgba(212, 145, 42, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 9999;
    opacity: 0.3;
  }

  .grid-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    opacity: 0.5;
  }

  .glow-top {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(139, 26, 43, 0.25) 0%, rgba(92, 16, 24, 0.1) 40%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
  }

  header {
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(212, 145, 42, 0.12);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 2px solid var(--amber);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.7rem;
    color: var(--amber);
    letter-spacing: -0.5px;
    position: relative;
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(212, 145, 42, 0.3);
  }

  .logo-text {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .logo-text span { color: var(--amber); }

  nav {
    display: flex;
    gap: 2.5rem;
  }

  nav a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.3s ease;
    position: relative;
  }

  nav a:hover { color: var(--amber); }
  nav a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0%; height: 1px;
    background: var(--amber);
    transition: width 0.3s ease;
  }
  nav a:hover::after { width: 100%; }

  .breadcrumb {
    padding: 1.5rem 3rem;
    max-width: 800px;
    margin: 0 auto;
  }

  .breadcrumb a {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.3s;
  }

  .breadcrumb a:hover { color: var(--amber); }

  .breadcrumb .sep {
    color: var(--text-muted);
    margin: 0 0.5rem;
    font-size: 0.6rem;
  }

  .breadcrumb .current {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
  }

  .article {
    padding: 3rem 3rem 6rem;
    max-width: 800px;
    margin: 0 auto;
  }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .article-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .article-tag {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0.2rem 0.6rem;
    border: 1px solid rgba(212, 145, 42, 0.1);
  }

  .article h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 400;
    font-size: 2rem;
    line-height: 1.3;
    color: var(--text-primary);
    margin-bottom: 3rem;
  }

  .article-body {
    font-size: 0.85rem;
    font-weight: 300;
    line-height: 2;
    color: var(--text-dim);
  }

  .divider {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 3rem;
  }

  .divider-line {
    height: 1px;
    background: linear-gradient(90deg, var(--crimson) 0%, rgba(212, 145, 42, 0.3) 50%, var(--crimson-deep) 100%);
  }

  footer {
    padding: 3rem;
    border-top: 1px solid rgba(212, 145, 42, 0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 800px;
    margin: 4rem auto 0;
  }

  .footer-copy {
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .footer-links {
    display: flex;
    gap: 2rem;
  }

  .footer-links a {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .footer-links a:hover { color: var(--amber); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .article-meta { animation: fadeInUp 0.8s ease both; animation-delay: 0.1s; }
  .article h1 { animation: fadeInUp 0.8s ease both; animation-delay: 0.2s; }
  .article-body { animation: fadeInUp 0.8s ease both; animation-delay: 0.3s; }

  @media (max-width: 768px) {
    header { padding: 1.5rem; flex-direction: column; gap: 1.5rem; }
    nav { gap: 1.5rem; }
    .breadcrumb { padding: 1.5rem; }
    .article { padding: 2rem 1.5rem 4rem; }
    .article h1 { font-size: 1.4rem; }
    footer { flex-direction: column; gap: 1rem; padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-top"></div>

<div class="content">

  <header>
    <a href="index.html" class="logo">
      <div class="logo-mark">RS</div>
      <div class="logo-text">Random <span>Samples</span></div>
    </a>
    <nav>
      <a href="index.html#plugins">Plugins</a>
      <a href="index.html#articles">Articles</a>
      <a href="index.html#about">About</a>
    </nav>
  </header>

  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="sep">/</span>
    <a href="index.html#articles">Articles</a>
    <span class="sep">/</span>
    <span class="current">RS-40 &amp; Moving Pictures</span>
  </div>

  <article class="article">
    <div class="article-meta">
      <span class="article-date">February 2026</span>
      <span class="article-tag">Bass</span>
    </div>
    <h1>Matching Geddy Lee's Moving Pictures bass tone with the RS-40</h1>
    <div class="article-body">
      Coming soon.
    </div>
  </article>

  <footer>
    <div class="footer-copy">© 2026 Random Samples</div>
    <div class="footer-links">
      <a href="https://github.com/jbrooks95/random-samples">GitHub</a>
    </div>
  </footer>

</div>

</body>
</html>
